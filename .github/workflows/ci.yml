name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sosta
          POSTGRES_PASSWORD: sosta
          POSTGRES_DB: sosta_bazar
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt ruff pytest httpx
      - run: ruff check app worker tests
      - env:
          DATABASE_URL: postgresql+asyncpg://sosta:sosta@localhost:5432/sosta_bazar
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: sosta-bazar-api:latest
